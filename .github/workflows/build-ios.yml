name: Build iOS
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build unsigned
        run: |
          xcodebuild -workspace DIYDragy.xcworkspace \
            -scheme "DIYDragy - iOS" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/DIYDragy.app Payload/
          zip -r DIYDragy.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: DIYDragy-ipa
          path: DIYDragy.ipa
